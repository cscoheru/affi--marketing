<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传奇塔防</title>
    <link rel="stylesheet" href="css/style.css?v=8">
</head>
<body>
    <div id="game-container">
        <!-- Main Menu Screen -->
        <div id="menu-screen" class="screen active">
            <h1 class="game-title">传奇塔防</h1>
            <div class="menu-buttons">
                <button id="btn-start" class="menu-btn">开始游戏</button>
                <button id="btn-editor" class="menu-btn">地图编辑器</button>
                <button id="btn-pvp" class="menu-btn">双人对战</button>
            </div>
        </div>

        <!-- Difficulty Select Screen -->
        <div id="difficulty-screen" class="screen">
            <h2>选择难度</h2>
            <div class="difficulty-buttons">
                <button class="diff-btn" data-diff="easy">简单</button>
                <button class="diff-btn" data-diff="normal">普通</button>
                <button class="diff-btn" data-diff="hard">困难</button>
                <button class="diff-btn" data-diff="hell">地狱</button>
            </div>
            <div id="diff-description" class="diff-desc"></div>
            <button id="btn-back-menu" class="menu-btn secondary">返回</button>
        </div>

        <!-- Map Select Screen -->
        <div id="map-screen" class="screen">
            <h2>选择地图</h2>
            <div id="map-list" class="map-list"></div>
            <button id="btn-back-diff" class="menu-btn secondary">返回</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <!-- HUD -->
            <div id="hud">
                <span id="hud-wave">波次: 0/0</span>
                <span id="hud-gold">金币: 0</span>
                <span id="hud-lives">生命: 20</span>
                <span id="hud-difficulty">普通</span>
            </div>

            <!-- Game Area -->
            <div id="game-area">
                <div id="canvas-viewport">
                    <canvas id="game-canvas" width="800" height="600"></canvas>
                </div>
                <!-- Weapon Shop Panel -->
                <div id="shop-panel">
                    <h3>武器商店</h3>
                    <div id="shop-items"></div>
                </div>
                <button id="btn-toggle-shop" class="mobile-only ctrl-btn">武器库</button>
            </div>

            <!-- Bottom Control Bar -->
            <div id="control-bar">
                <button id="btn-start-wave" class="ctrl-btn">开始波次</button>
                <button id="btn-pause" class="ctrl-btn">暂停</button>
                <button id="btn-speed" class="ctrl-btn">加速 x1</button>
                <button id="btn-back-menu-game" class="ctrl-btn">菜单</button>
            </div>

            <!-- Tower Info Panel (hidden by default) -->
            <div id="tower-info" style="display:none; position:absolute; z-index:50;">
                <div class="tower-info-content">
                    <h4 id="tower-info-name"></h4>
                    <div id="tower-info-stats"></div>
                    <div class="tower-info-buttons">
                        <button id="btn-upgrade" class="ctrl-btn">升级</button>
                        <button id="btn-sell" class="ctrl-btn">出售</button>
                        <button id="btn-close-info" class="ctrl-btn">关闭</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Map Editor Screen -->
        <div id="editor-screen" class="screen">
            <div id="editor-toolbar">
                <span class="tool-label">工具:</span>
                <button class="tool-btn active" data-tool="grass">草地</button>
                <button class="tool-btn" data-tool="path">路径</button>
                <button class="tool-btn" data-tool="obstacle">障碍</button>
                <span class="tool-sep">|</span>
                <button class="tool-btn" data-tool="start">设起点</button>
                <button class="tool-btn" data-tool="end">设终点</button>
                <span class="tool-sep">|</span>
                <button id="btn-editor-pan" class="tool-btn mobile-only">拖拽</button>
                <input type="text" id="map-name-input" placeholder="地图名称">
                <button id="btn-save-map" class="ctrl-btn">保存</button>
                <button id="btn-load-map" class="ctrl-btn">加载</button>
                <button id="btn-test-map" class="ctrl-btn">测试</button>
                <button id="btn-clear-map" class="ctrl-btn">清空</button>
                <button id="btn-back-menu-editor" class="ctrl-btn">返回</button>
            </div>
            <div id="editor-viewport">
                <canvas id="editor-canvas" width="800" height="600"></canvas>
            </div>
        </div>

        <!-- Game Over / Victory Overlay -->
        <div id="result-overlay" class="screen overlay">
            <div id="result-content">
                <h2 id="result-title"></h2>
                <div id="result-stats"></div>
                <button id="btn-retry" class="menu-btn">重新开始</button>
                <button id="btn-back-menu-result" class="menu-btn secondary">返回菜单</button>
            </div>
        </div>

        <!-- PvP Lobby Screen -->
        <div id="pvp-lobby-screen" class="screen">
            <h2>双人对战</h2>
            <div class="lobby-section">
                <div class="lobby-box">
                    <h3>创建房间（防守方）</h3>
                    <div class="lobby-field">
                        <label>选择地图:</label>
                        <select id="pvp-map-select"></select>
                    </div>
                    <div class="lobby-field">
                        <label>选择难度:</label>
                        <select id="pvp-diff-select">
                            <option value="easy">简单</option>
                            <option value="normal" selected>普通</option>
                            <option value="hard">困难</option>
                            <option value="hell">地狱</option>
                        </select>
                    </div>
                    <button id="btn-create-room" class="menu-btn">创建房间</button>
                    <div id="room-id-display" class="room-id" style="display:none;">
                        房间号: <span id="room-id-text"></span>
                        <p class="room-hint">将房间号告诉对手</p>
                    </div>
                </div>
                <div class="lobby-box">
                    <h3>加入房间（进攻方）</h3>
                    <input type="text" id="join-room-input" placeholder="输入房间号" maxlength="6" class="lobby-input">
                    <button id="btn-join-room" class="menu-btn">加入房间</button>
                    <div id="join-status" class="join-status"></div>
                </div>
            </div>
            <div id="lobby-waiting" class="lobby-waiting" style="display:none;">
                <p id="lobby-waiting-text">等待对手加入...</p>
                <button id="btn-lobby-ready" class="menu-btn" style="display:none;">准备</button>
                <button id="btn-leave-lobby" class="menu-btn secondary">离开</button>
            </div>
            <button id="btn-back-menu-pvp" class="menu-btn secondary">返回菜单</button>
        </div>

        <!-- PvP Game Screen -->
        <div id="pvp-game-screen" class="screen">
            <div id="pvp-hud">
                <span id="pvp-hud-role"></span>
                <span id="pvp-hud-lives">生命: --</span>
                <span id="pvp-hud-defender-gold">防守金币: --</span>
                <span id="pvp-hud-attacker-gold">进攻资源: --</span>
            </div>
            <div id="pvp-game-area">
                <div id="pvp-viewport">
                    <canvas id="pvp-canvas" width="800" height="600"></canvas>
                </div>
                <div id="pvp-side-panel"></div>
            </div>
            <button id="btn-toggle-pvp-panel" class="mobile-only ctrl-btn" style="display:none;">面板</button>
            <div id="pvp-control-bar">
                <button id="btn-pvp-ready" class="ctrl-btn">准备</button>
                <button id="btn-pvp-back-menu" class="ctrl-btn">返回菜单</button>
            </div>
        </div>
    </div>

    <!-- Load game modules -->
    <script type="module" src="js/main.js?v=12"></script>
</body>
</html>
